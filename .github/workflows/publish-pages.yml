name: Publish APTV playlist

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Restore health history
        uses: actions/cache/restore@v4
        with:
          path: health_state.json
          key: health-state-${{ github.run_id }}
          restore-keys: |
            health-state-

      - name: Run parser tests
        run: python -m unittest -v

      - name: Fetch public candidates
        run: python fetch_raw.py

      - name: Probe and build playlist
        run: python playlist_builder.py --timeout 30 --workers 12

      - name: Prepare public snapshot
        run: python prepare_publish.py

      - name: Save health history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: health_state.json
          key: health-state-${{ github.run_id }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
